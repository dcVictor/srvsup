services:
  database:
    image: postgres
    restart: always
    container_name: srvsupDB
    environment:
      POSTGRES_PASSWORD: KALIX
      POSTGRES_DB: srvsupDB
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./back
    restart: always
    container_name: srvsupBack
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:KALIX@database:5432/srvsupDB
    depends_on:
      - database

  frontend:
    build: ./front
    restart: always
    container_name: srvsupFront
    ports:
      - "5173:5173"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: srvsupProxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend


  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: srvsupMedia
    restart: always
    ports:
      - "8554:8554" # RTSP
      - "1935:1935" # RTMP
      - "8888:8888" # HLS
      - "8889:8889" # WebRTC
    volumes:
      # Mapeia o seu arquivo local para dentro do container
      - ./mediamtx.yml:/mediamtx.yml:ro

volumes:
  pgdata: 