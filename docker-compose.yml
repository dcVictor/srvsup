services:
  database:
    image: postgres:latest
    container_name: srvsupDB
    restart: always
    environment:
      POSTGRES_PASSWORD: KALIX
      POSTGRES_DB: srvsupDB
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  backend:
    build: ./back
    container_name: srvsupBack
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Ajustado de @database para @database (deve bater com o nome do serviço acima)
      DATABASE_URL: postgres://postgres:KALIX@database:5432/srvsupDB
    depends_on:
      - database

  frontend:
    build: ./front
    container_name: srvsupFront
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: srvsupProxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: srvsupMedia
    restart: always
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

volumes:
  pgdata: # Declaração final do volume para persistência de dados